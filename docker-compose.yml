services:
  mongodb:
    image: mongo:8
    container_name: mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db
  
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  mongodb_data:
  qdrant_data: